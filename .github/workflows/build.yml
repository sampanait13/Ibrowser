name: Build APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract and normalize project
        run: |
          if [ -f LifeBrowser.zip ]; then
            unzip -oq LifeBrowser.zip
          fi
          if [ -d LifeBrowser ] && [ -f LifeBrowser/build.gradle ]; then
            rm -rf LifeBrowser/.github
            shopt -s dotglob
            cp -r LifeBrowser/* . 2>/dev/null || true
            rm -rf LifeBrowser
          fi
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LifeBrowser-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
